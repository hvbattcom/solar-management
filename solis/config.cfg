[SolisInverter]
# Solis Inverter Configuration File

# IP address of the logger device
inverter_ip = 127.0.0.1

# Optional; 502 is common for newer S2-WL-ST, 8899 for some older loggers
inverter_port = 1502

# Modbus device id / unit id
slave_id = 1

# Expected inverter serial – if mismatch, output is suppressed and error returned
# Leave empty to skip serial check
serial = 1053040257040114

# Inverter rated power in kW – used to calculate load percentages
inverter_power_kw = 40

# ── Value Sanity Ranges ──────────────────────────────────────────────────────
# Values outside these ranges are treated as invalid Modbus garbage and dropped.
# Format: key_min / key_max  (same key names as SENSORS)
# Voltages
pv_voltage_min = 0
pv_voltage_max = 1500
ac_voltage_min = 0
ac_voltage_max = 280
backup_voltage_min = 0
backup_voltage_max = 280
battery_voltage_min = 0
battery_voltage_max = 900

# Currents
pv_current_min = 0
pv_current_max = 50
ac_current_min = -100
ac_current_max = 100
battery_current_min = -300
battery_current_max = 300

# Power / Percentage
pct_min = 0
pct_max = 100
power_w_min = -100000
power_w_max = 100000

# Temperature
temperature_min = -20
temperature_max = 100

# Frequency
frequency_min = 0
frequency_max = 65

# ── All-zeros block suppression ──────────────────────────────────────────────
# Some register blocks legitimately return all zeros when a subsystem is off
# (e.g. grid meter when the grid is disconnected).  Setting the flag below to
# true disables the all-zeros warning and the automatic re-read for that block.
#
# Block names and the registers they cover:
#   main    – 33004-33096  (serial, PV strings, inverter output, temp/freq/status)
#   faults  – 33116-33121  (fault codes 01-05, operating status)
#   battery – 33133-33179  (battery, backup, energy counters)
#   grid    – 33251-33264  (grid meter voltages, currents, power)
#   load    – 33580-33596  (household & backup load energy totals)
#
zeros_ok_main    = false
zeros_ok_faults  = false
zeros_ok_battery = false
zeros_ok_grid    = false
zeros_ok_load    = false
