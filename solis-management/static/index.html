<!-- Solis Management Panel — safe to embed in Grafana HTML panel -->
<style>
  .sp {
    --bg:     #f0f4f8;
    --card:   #ffffff;
    --border: #dde2e8;
    --accent: #f97316;
    --accent2:#ea6c0a;
    --ok:     #16a34a;
    --err:    #dc2626;
    --text:   #1e293b;
    --muted:  #64748b;
    --r:      8px;
    font: 15px/1.6 system-ui, sans-serif;
    color: #1e293b;
    background: #f0f4f8;
    color-scheme: light;
  }
  /* scope the universal reset inside our panel only */
  .sp *, .sp *::before, .sp *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── Header ── */
  .sp-header {
    background: var(--accent); color: #fff;
    padding: 14px 24px; display: flex; align-items: center; gap: 12px;
  }
  .sp-header h1 { font-size: 1.2rem; flex: 1; }
  .sp-header #updated { font-size: 0.82rem; opacity: .85; }
  .sp-header button {
    padding: 6px 14px; background: rgba(255,255,255,.2); color: #fff;
    border: 1px solid rgba(255,255,255,.4); border-radius: 6px;
    font-size: 0.85rem; cursor: pointer;
  }
  .sp-header button:hover { background: rgba(255,255,255,.35); }

  /* ── Layout ── */
  .sp-main { max-width: 980px; margin: 24px auto; padding: 0 16px; display: flex; flex-direction: column; gap: 20px; }

  /* ── Card ── */
  .sp .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 20px; }
  .sp .card h2 {
    font-size: .78rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: .07em; color: var(--muted); margin-bottom: 16px;
  }

  /* ── Storage fields ── */
  .sp .field { display: flex; flex-direction: column; gap: 4px; }
  .sp .field label { font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); }
  .sp .field input[type=number] {
    padding: 8px 10px; border: 1px solid #dde2e8 !important; border-radius: 6px;
    font-size: .95rem; color: #1e293b !important; -webkit-text-fill-color: #1e293b !important;
    background: #fff !important; width: 100%;
  }
  .sp .field input:focus { outline: 2px solid #f97316; border-color: transparent !important; }

  /* ── Custom select (replaces native <select> to avoid Grafana CSS override) ── */
  .sp-sel {
    position: relative; width: 100%; cursor: pointer; user-select: none;
  }
  .sp-sel-val {
    padding: 8px 32px 8px 10px; border: 1px solid #dde2e8; border-radius: 6px;
    font-size: .95rem; color: #1e293b; background: #fff;
    display: flex; align-items: center; min-height: 38px;
  }
  .sp-sel-val::after {
    content: '▾'; position: absolute; right: 10px; top: 50%;
    transform: translateY(-50%); color: #64748b; pointer-events: none;
  }
  .sp-sel.open .sp-sel-val { border-color: #f97316; outline: 2px solid #f97316; border-radius: 6px 6px 0 0; }
  .sp-sel-opts {
    display: none; position: absolute; top: 100%; left: 0; right: 0; z-index: 200;
    background: #fff; border: 1px solid #f97316; border-top: none;
    border-radius: 0 0 6px 6px; box-shadow: 0 6px 16px rgba(0,0,0,.12);
  }
  .sp-sel.open .sp-sel-opts { display: block; }
  .sp-sel-opt {
    padding: 9px 10px; font-size: .95rem; color: #1e293b; cursor: pointer;
  }
  .sp-sel-opt:hover { background: #f0f4f8; }
  .sp-sel-opt.sel  { color: #f97316; font-weight: 600; }

  .sp .tog { display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .sp .tog input { width: 17px; height: 17px; accent-color: var(--accent); cursor: pointer; }
  .sp .tog span { font-size: .9rem; }

  .sp .actions { display: flex; align-items: center; gap: 12px; margin-top: 16px; }
  .sp button.primary {
    padding: 8px 20px; background: var(--accent); color: #fff;
    border: none; border-radius: 6px; font-size: .9rem; font-weight: 600; cursor: pointer;
  }
  .sp button.primary:hover { background: var(--accent2); }
  .sp button.primary:disabled { opacity: .5; cursor: default; }

  .sp .msg { font-size: .83rem; font-weight: 700; }
  .sp .msg.ok  { color: var(--ok); }
  .sp .msg.err { color: var(--err); }

  /* ── TOU table ── */
  .sp .tou-wrap { overflow-x: auto; }
  .sp table { width: 100%; border-collapse: collapse; font-size: .88rem; }
  .sp th {
    text-align: left; font-size: .72rem; text-transform: uppercase;
    letter-spacing: .06em; color: var(--muted);
    padding: 6px 8px; border-bottom: 2px solid var(--border);
    white-space: nowrap;
  }
  .sp td { padding: 5px 4px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
  .sp tr:last-child td { border-bottom: none; }
  .sp tr.on td { background: #f0fdf4; }

  .sp td.num { font-weight: 700; color: var(--muted); text-align: center; width: 28px; }
  .sp td input[type=checkbox] { display: block; margin: auto; width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
  .sp td input[type=number] {
    padding: 5px 6px; border: 1px solid #dde2e8 !important; border-radius: 5px;
    font-size: .86rem; width: 100%; background: #fff !important; color: #1e293b !important;
  }
  .sp td input:focus { outline: 2px solid var(--accent); border-color: transparent; }
  .sp .field input[type=number]:disabled,
  .sp td input[type=number]:disabled {
    opacity: .45; cursor: not-allowed;
    background: #f1f5f9 !important; -webkit-text-fill-color: #94a3b8 !important;
  }
  .sp button.time-btn:disabled { opacity: .45; cursor: not-allowed; border-color: var(--border); }

  .sp .col-time { width: 76px; }
  .sp .col-n    { width: 84px; }

  .sp .setting-rows { display: flex; flex-direction: column; gap: 10px; }
  .sp .setting-row  { display: flex; align-items: center; gap: 20px; }
  .sp .setting-row .field { flex: 0 0 260px; }
  .sp .setting-row .tog   { flex: 1; padding-top: 18px; }

  /* ── Time button ── */
  .sp button.time-btn {
    width: 100%; padding: 5px 4px;
    background: #fff; border: 1px solid var(--border); border-radius: 5px;
    font-size: .9rem; font-family: ui-monospace, monospace;
    cursor: pointer; text-align: center; color: var(--text);
  }
  .sp button.time-btn:hover { border-color: var(--accent); }

  /* ── Drum picker modal ── */
  .sp-tp-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 99999;
  }
  .sp-tp-dialog {
    background: #fff; border-radius: 20px; width: 280px;
    overflow: hidden; box-shadow: 0 24px 64px rgba(0,0,0,.3);
    user-select: none; font-family: system-ui, sans-serif;
  }
  .sp-tp-dialog .tp-header {
    padding: 16px 16px 12px; text-align: center;
    font-weight: 700; font-size: 1rem; color: #1e293b;
  }
  .sp-tp-dialog .tp-drums {
    display: flex; align-items: center; justify-content: center;
    height: 220px; padding: 0 8px;
  }
  .sp-tp-dialog .tp-col {
    flex: 1; height: 100%; position: relative;
    overflow: hidden; cursor: grab; touch-action: none;
  }
  .sp-tp-dialog .tp-col:active { cursor: grabbing; }
  .sp-tp-dialog .tp-items { position: absolute; width: 100%; will-change: transform; }
  .sp-tp-dialog .tp-item {
    height: 44px; display: flex; align-items: center; justify-content: center;
    font-size: 1.75rem; font-weight: 500; color: #1e293b;
    font-variant-numeric: tabular-nums; font-family: ui-monospace, monospace;
  }
  .sp-tp-dialog .tp-hl {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 100%; height: 44px; pointer-events: none;
    border-top: 2px solid #f97316; border-bottom: 2px solid #f97316;
  }
  .sp-tp-dialog .tp-col::before, .sp-tp-dialog .tp-col::after {
    content: ''; position: absolute; left: 0; right: 0; height: 88px; z-index: 1; pointer-events: none;
  }
  .sp-tp-dialog .tp-col::before { top: 0;    background: linear-gradient(to bottom, rgba(255,255,255,.97), transparent); }
  .sp-tp-dialog .tp-col::after  { bottom: 0; background: linear-gradient(to top,    rgba(255,255,255,.97), transparent); }
  .sp-tp-dialog .tp-sep { font-size: 2.2rem; font-weight: 700; padding: 0 10px; color: #1e293b; flex-shrink: 0; margin-bottom: 4px; }
  .sp-tp-dialog .tp-actions { display: flex; border-top: 1px solid #dde2e8; }
  .sp-tp-dialog .tp-actions button {
    flex: 1; padding: 15px; border: none; background: none;
    font-size: .95rem; font-weight: 600; cursor: pointer;
  }
  .sp-tp-dialog .tp-actions button:first-child { border-right: 1px solid #dde2e8; color: #64748b; }
  .sp-tp-dialog .tp-actions button:last-child  { color: #f97316; }
  .sp-tp-dialog .tp-actions button:hover { background: #f0f4f8; }
</style>

<div class="sp">
  <div class="sp-header">
    <h1>☀️ Solis Management</h1>
    <span id="updated">—</span>
    <button onclick="loadSettings()">↻ Refresh</button>
  </div>

  <div class="sp-main">

    <!-- Storage Settings -->
    <div class="card">
      <h2>Storage Settings</h2>
      <div class="setting-rows">
        <div class="setting-row">
          <div class="field">
            <label>Mode</label>
            <div class="sp-sel" id="mode" data-value="Self Use" onclick="spToggle(this)">
              <div class="sp-sel-val">Self Use</div>
              <div class="sp-sel-opts">
                <div class="sp-sel-opt sel" onclick="spPick(this)">Self Use</div>
                <div class="sp-sel-opt"     onclick="spPick(this)">Time of Use</div>
                <div class="sp-sel-opt"     onclick="spPick(this)">Off Grid</div>
                <div class="sp-sel-opt"     onclick="spPick(this)">Feed In Priority</div>
                <div class="sp-sel-opt"     onclick="spPick(this)">Peak Shaving</div>
              </div>
            </div>
          </div>
          <label class="tog">
            <input type="checkbox" id="allow_grid_charge">
            <span>Allow Grid Charge</span>
          </label>
        </div>
        <div class="setting-row">
          <div class="field">
            <label>Max Export Power (W)</label>
            <input type="number" id="max_export_power_w" min="0" step="100">
          </div>
          <label class="tog">
            <input type="checkbox" id="allow_export" onchange="setExportLock(this.checked)">
            <span>Allow Export</span>
          </label>
        </div>
        <div class="setting-row">
          <div class="field">
            <label>Battery Reserve (%)</label>
            <input type="number" id="battery_reserve_pct" min="0" max="100" step="1">
          </div>
          <label class="tog">
            <input type="checkbox" id="battery_reserve_on" onchange="setReserveLock(this.checked)">
            <span>Battery Reserve Switch</span>

        </div>
      </div>
      <div class="actions">
        <button class="primary" onclick="saveStorage()">Save</button>
        <span class="msg" id="storage-msg"></span>
      </div>
    </div>

    <!-- TOU Charge Slots -->
    <div class="card">
      <h2>TOU — Charge Slots</h2>
      <div class="tou-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th><th>En</th>
              <th class="col-time">Start</th><th class="col-time">End</th>
              <th class="col-n">Current A</th><th class="col-n">SOC %</th>
            </tr>
          </thead>
          <tbody id="charge-body"></tbody>
        </table>
      </div>
      <div class="actions">
        <button class="primary" onclick="saveAllSlots('charge')">Save</button>
        <span class="msg" id="charge-msg"></span>
      </div>
    </div>

    <!-- TOU Discharge Slots -->
    <div class="card">
      <h2>TOU — Discharge Slots</h2>
      <div class="tou-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th><th>En</th>
              <th class="col-time">Start</th><th class="col-time">End</th>
              <th class="col-n">Current A</th><th class="col-n">SOC %</th>
            </tr>
          </thead>
          <tbody id="discharge-body"></tbody>
        </table>
      </div>
      <div class="actions">
        <button class="primary" onclick="saveAllSlots('discharge')">Save</button>
        <span class="msg" id="discharge-msg"></span>
      </div>
    </div>

  </div><!-- sp-main -->
</div><!-- sp -->

<!-- Drum time picker modal (outside .sp so position:fixed covers full screen) -->
<div id="tp-modal" class="sp-tp-overlay" style="display:none" onclick="if(event.target===this)cancelTimePicker()">
  <div class="sp-tp-dialog">
    <div class="tp-header">Set Time</div>
    <div class="tp-drums">
      <div class="tp-col" id="tp-hour"></div>
      <div class="tp-sep">:</div>
      <div class="tp-col" id="tp-min"></div>
    </div>
    <div class="tp-actions">
      <button onclick="cancelTimePicker()">Cancel</button>
      <button onclick="confirmTimePicker()">OK</button>
    </div>
  </div>
</div>

<script>
const BASE = "";
const _snap = { charge: null, discharge: null };

/* ── Drum scroll-wheel picker ─────────────────────────────────────────────── */

const ITEM_H = 44;
const CTR    = 2 * ITEM_H;

class Drum {
  constructor(el, count, fmt) {
    this.count = count;
    this._maxY = CTR;
    this._minY = CTR - (count - 1) * ITEM_H;
    this._y    = CTR;

    const items = document.createElement('div');
    items.className = 'tp-items';
    for (let i = 0; i < count; i++) {
      const d = document.createElement('div');
      d.className = 'tp-item';
      d.textContent = fmt(i);
      items.appendChild(d);
    }
    el.appendChild(items);
    this._items = items;

    const hl = document.createElement('div');
    hl.className = 'tp-hl';
    el.appendChild(hl);

    this._bind(el);
  }

  get value() {
    return Math.max(0, Math.min(this.count - 1,
      Math.round((CTR - this._y) / ITEM_H)));
  }
  set value(i) { this._moveTo(CTR - i * ITEM_H, false); }

  _moveTo(y, anim) {
    y = Math.max(this._minY, Math.min(this._maxY, y));
    this._y = y;
    this._items.style.transition = anim ? 'transform .22s cubic-bezier(.25,.46,.45,.94)' : 'none';
    this._items.style.transform  = `translateY(${y}px)`;
  }

  _fling(y, vel) {
    const idx = Math.round((CTR - (y + vel * 0.1)) / ITEM_H);
    this._moveTo(CTR - Math.max(0, Math.min(this.count - 1, idx)) * ITEM_H, true);
  }

  _bind(el) {
    let sy = null, y0, ly, lt, vel;

    const start = cy => {
      this._items.style.transition = 'none';
      sy = cy; y0 = this._y; ly = cy; lt = Date.now(); vel = 0;
    };
    const move = cy => {
      if (sy === null) return;
      const now = Date.now();
      vel = (cy - ly) / Math.max(1, now - lt) * 1000;
      ly = cy; lt = now;
      let y = y0 + (cy - sy);
      if (y > this._maxY) y = this._maxY + (y - this._maxY) * 0.25;
      if (y < this._minY) y = this._minY - (this._minY - y) * 0.25;
      this._y = y;
      this._items.style.transform = `translateY(${y}px)`;
    };
    const end = () => { if (sy !== null) { this._fling(this._y, vel); sy = null; } };

    el.addEventListener('touchstart', e => { start(e.touches[0].clientY); e.preventDefault(); }, { passive: false });
    el.addEventListener('touchmove',  e => { move(e.touches[0].clientY);  e.preventDefault(); }, { passive: false });
    el.addEventListener('touchend',   end);
    el.addEventListener('mousedown',  e => start(e.clientY));
    window.addEventListener('mousemove', e => { if (sy !== null) move(e.clientY); });
    window.addEventListener('mouseup',   () => { if (sy !== null) end(); });
    el.addEventListener('wheel', e => {
      e.preventDefault();
      const next = Math.max(0, Math.min(this.count - 1, this.value + (e.deltaY > 0 ? 1 : -1)));
      this._moveTo(CTR - next * ITEM_H, true);
    }, { passive: false });
  }
}

let _tpId = null, _drums = null;

function _initDrums() {
  if (_drums) return;
  const pad = i => String(i).padStart(2, '0');
  _drums = {
    h: new Drum(document.getElementById('tp-hour'), 24, pad),
    m: new Drum(document.getElementById('tp-min'),  60, pad),
  };
}

function openTimePicker(id) {
  _initDrums();
  _tpId = id;
  const [h, m] = (document.getElementById(id).dataset.value || '00:00').split(':').map(Number);
  _drums.h.value = h;
  _drums.m.value = m;
  document.getElementById('tp-modal').style.display = 'flex';
}

function confirmTimePicker() {
  const val = String(_drums.h.value).padStart(2,'0') + ':' + String(_drums.m.value).padStart(2,'0');
  const btn = document.getElementById(_tpId);
  btn.textContent = val;
  btn.dataset.value = val;
  document.getElementById('tp-modal').style.display = 'none';
}

function cancelTimePicker() {
  document.getElementById('tp-modal').style.display = 'none';
}

/* ── Custom select ── */
function spSet(id, val) {
  const sel = document.getElementById(id);
  const opt = [...sel.querySelectorAll('.sp-sel-opt')].find(o => o.textContent === val);
  if (!opt) return;
  sel.dataset.value = val;
  sel.querySelector('.sp-sel-val').textContent = val;
  sel.querySelectorAll('.sp-sel-opt').forEach(o => o.classList.toggle('sel', o === opt));
}
function spToggle(el) {
  const isOpen = el.classList.contains('open');
  document.querySelectorAll('.sp-sel.open').forEach(s => s.classList.remove('open'));
  if (!isOpen) el.classList.add('open');
}
function spPick(opt) {
  spSet(opt.closest('.sp-sel').id, opt.textContent);
  opt.closest('.sp-sel').classList.remove('open');
  event.stopPropagation();
}
document.addEventListener('click', e => {
  if (!e.target.closest('.sp-sel')) document.querySelectorAll('.sp-sel.open').forEach(s => s.classList.remove('open'));
});

/* ── Helpers ── */
function flash(id, text, type) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = text;
  el.className = (el.tagName === 'SPAN' ? 'msg ' : 'rmsg ') + type;
  if (text) setTimeout(() => { if (el.textContent === text) el.textContent = ''; }, 4000);
}

/* ── Load ── */
async function loadSettings() {
  try {
    const res = await fetch(BASE + '/api/settings');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const d = await res.json();
    fillStorage(d.storage);
    if (d.tou) {
      fillSlots('charge',    d.tou.charge_slots);
      fillSlots('discharge', d.tou.discharge_slots);
    }
    document.getElementById('updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById('updated').textContent = '⚠ ' + e.message;
  }
}

/* ── Storage ── */
function setExportLock(on)  { document.getElementById('max_export_power_w').disabled  = !on; }
function setReserveLock(on) { document.getElementById('battery_reserve_pct').disabled = !on; }

function fillStorage(s) {
  spSet('mode', s.mode);
  document.getElementById('battery_reserve_on').checked = s.battery_reserve_on;
  document.getElementById('battery_reserve_pct').value  = s.battery_reserve_pct;
  document.getElementById('allow_export').checked       = s.allow_export;
  document.getElementById('allow_grid_charge').checked  = s.allow_grid_charge;
  document.getElementById('max_export_power_w').value   = s.max_export_power_w;
  setExportLock(s.allow_export);
  setReserveLock(s.battery_reserve_on);
}

async function saveStorage() {
  const raw = parseInt(document.getElementById('max_export_power_w').value) || 0;
  const body = {
    mode:                document.getElementById('mode').dataset.value,
    battery_reserve_on:  document.getElementById('battery_reserve_on').checked,
    battery_reserve_pct: parseInt(document.getElementById('battery_reserve_pct').value) || 0,
    allow_export:        document.getElementById('allow_export').checked,
    allow_grid_charge:   document.getElementById('allow_grid_charge').checked,
    max_export_power_w:  Math.round(raw / 100) * 100,
  };
  try {
    const res  = await fetch(BASE + '/api/settings/storage', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    const data = await res.json();
    if (data.ok) { flash('storage-msg', '✓ Saved', 'ok'); loadSettings(); }
    else           flash('storage-msg', '✗ ' + data.error, 'err');
  } catch (e) {   flash('storage-msg', '✗ ' + e.message,  'err'); }
}

/* ── TOU slots ── */
function fillSlots(type, slots) {
  const tbody = document.getElementById(type + '-body');
  tbody.innerHTML = '';
  slots.forEach(s => {
    const tr = document.createElement('tr');
    if (s.enabled) tr.className = 'on';
    tr.id = `row-${type}-${s.slot}`;
    tr.innerHTML = `
      <td class="num">${s.slot}</td>
      <td><input type="checkbox" id="${type}-en-${s.slot}" ${s.enabled?'checked':''} onchange="syncRow('${type}',${s.slot})"></td>
      <td class="col-time">
        <button class="time-btn" id="${type}-start-${s.slot}" data-value="${s.start}"
          onclick="openTimePicker('${type}-start-${s.slot}')">${s.start}</button>
      </td>
      <td class="col-time">
        <button class="time-btn" id="${type}-end-${s.slot}" data-value="${s.end}"
          onclick="openTimePicker('${type}-end-${s.slot}')">${s.end}</button>
      </td>
      <td class="col-n"><input type="number" id="${type}-cur-${s.slot}" value="${s.current_a}" min="0" step="0.1"></td>
      <td class="col-n"><input type="number" id="${type}-soc-${s.slot}" value="${s.soc_pct}"   min="0" max="100"></td>`;
    tbody.appendChild(tr);
    lockRow(type, s.slot, s.enabled);
  });
  _snap[type] = slots.map(s => ({ ...s }));
}

function lockRow(type, slot, on) {
  [`${type}-start-${slot}`, `${type}-end-${slot}`, `${type}-cur-${slot}`, `${type}-soc-${slot}`]
    .forEach(id => { const el = document.getElementById(id); if (el) el.disabled = !on; });
}
function syncRow(type, slot) {
  const on = document.getElementById(`${type}-en-${slot}`).checked;
  document.getElementById(`row-${type}-${slot}`).className = on ? 'on' : '';
  lockRow(type, slot, on);
}

function _slotChanged(type, slot, body) {
  const prev = _snap[type]?.[slot - 1];
  if (!prev) return true;
  return body.enabled            !== prev.enabled
      || body.start              !== prev.start
      || body.end                !== prev.end
      || Math.abs(body.current_a - prev.current_a) > 0.001
      || body.soc_pct            !== prev.soc_pct;
}

async function saveAllSlots(type) {
  const btn = document.querySelector(`[onclick="saveAllSlots('${type}')"]`);
  btn.disabled = true;

  const toSave = [1,2,3,4,5,6].map(slot => {
    const body = {
      enabled:   document.getElementById(`${type}-en-${slot}`).checked,
      start:     document.getElementById(`${type}-start-${slot}`).dataset.value,
      end:       document.getElementById(`${type}-end-${slot}`).dataset.value,
      current_a: parseFloat(document.getElementById(`${type}-cur-${slot}`).value) || 0,
      soc_pct:   parseInt(document.getElementById(`${type}-soc-${slot}`).value)   || 0,
    };
    return _slotChanged(type, slot, body) ? { slot, body } : null;
  }).filter(Boolean);

  if (toSave.length === 0) {
    btn.disabled = false;
    flash(`${type}-msg`, '✓ No changes', 'ok');
    return;
  }

  const results = await Promise.all(toSave.map(({ slot, body }) =>
    fetch(`${BASE}/api/settings/tou/${type}/${slot}`, {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
    }).then(r => r.json()).catch(e => ({ ok: false, error: e.message }))
  ));

  btn.disabled = false;
  const failed = results.filter(r => !r.ok);
  if (failed.length === 0) { flash(`${type}-msg`, `✓ Saved (${toSave.length} slot${toSave.length > 1 ? 's' : ''})`, 'ok'); loadSettings(); }
  else flash(`${type}-msg`, `✗ ${failed.length} slot(s) failed`, 'err');
}

requestAnimationFrame(loadSettings);
</script>
